apiVersion: v1
kind: Service
metadata:
  name: {{ include "zonix.fullname" . }}-backend
  labels:
    {{- include "zonix.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "zonix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
