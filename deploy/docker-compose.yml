services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: zonix
      POSTGRES_USER: zonix
      POSTGRES_PASSWORD: zonix
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  powerdns-db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: powerdns
      MARIADB_USER: powerdns
      MARIADB_PASSWORD: powerdns
      MARIADB_ROOT_PASSWORD: powerdns-root
    volumes:
      - ./powerdns/init/mysql:/docker-entrypoint-initdb.d:ro
      - powerdns_db_data:/var/lib/mysql

  powerdns:
    image: powerdns/pdns-auth-49:latest
    entrypoint:
      - /bin/sh
      - /usr/local/bin/start-powerdns.sh
    command:
      - -eu
    depends_on:
      - powerdns-db
    ports:
      - "8081:8081"
      - "5300:5300/tcp"
      - "5300:5300/udp"
    volumes:
      - ./powerdns/config:/etc/pdns-zonix:ro
      - ./powerdns/zones:/etc/pdns-zones:ro
      - ./powerdns/start-powerdns.sh:/usr/local/bin/start-powerdns.sh:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:9010
      KC_PROXY_HEADERS: xforwarded
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/zonix-realm.json:/opt/keycloak/data/import/zonix-realm.json:ro

  oidc-gateway:
    build:
      context: ./oidc-gateway
    environment:
      OIDC_GATEWAY_PUBLIC_BASE_URL: http://localhost:9010
      OIDC_GATEWAY_INTERNAL_BASE_URL: http://oidc-gateway:9000
      OIDC_GATEWAY_UPSTREAM_BASE_URL: http://keycloak:8080
    depends_on:
      - keycloak
    ports:
      - "9010:9000"

  backend:
    build:
      context: ../backend
    environment:
      ZONIX_ENV: development
      ZONIX_DATABASE_URL: postgresql://zonix:zonix@postgres:5432/zonix
      ZONIX_BOOTSTRAP_ADMIN_ENABLED: "true"
      ZONIX_BOOTSTRAP_ADMIN_USERNAME: admin
      ZONIX_BOOTSTRAP_ADMIN_PASSWORD: local-dev-admin-change-me
      ZONIX_SESSION_SECRET_KEY: local-dev-session-secret-change-me-32-bytes
      ZONIX_SESSION_COOKIE_SAMESITE: lax
      ZONIX_SESSION_COOKIE_SECURE: "false"
      ZONIX_SESSION_TTL_SECONDS: 43200
      ZONIX_AUTH_OIDC_SELF_SIGNUP_ENABLED: "false"
      ZONIX_BOOTSTRAP_USERS_JSON: >-
        [{"username":"alice","password":"editor","role":"editor","authSource":"local"},
        {"username":"bob","password":"viewer","role":"viewer","authSource":"local"},
        {"username":"oidc.admin","role":"admin","authSource":"oidc:corp-oidc"},
        {"username":"oidc.editor","role":"editor","authSource":"oidc:corp-oidc"},
        {"username":"oidc.viewer","role":"viewer","authSource":"oidc:corp-oidc"}]
      ZONIX_BOOTSTRAP_ZONE_GRANTS_JSON: >-
        [{"username":"alice","zoneName":"example.com","actions":["write"]},
        {"username":"bob","zoneName":"internal.example","actions":["read"]}]
      ZONIX_OIDC_BOOTSTRAP_NAME: corp-oidc
      ZONIX_OIDC_BOOTSTRAP_ISSUER: http://oidc-gateway:9000/realms/zonix
      ZONIX_OIDC_BOOTSTRAP_CLIENT_ID: zonix-ui
      ZONIX_OIDC_BOOTSTRAP_CLIENT_SECRET: super-secret
      ZONIX_OIDC_BOOTSTRAP_SCOPES: openid,groups
      ZONIX_OIDC_BOOTSTRAP_CLAIMS_MAPPING_RULES: >-
        {"usernameClaim":"preferred_username","rolesClaim":"groups","adminGroups":["dns-admins"],"zoneEditorPattern":"zone-{zone}-editors","zoneViewerPattern":"zone-{zone}-viewers"}
      ZONIX_POWERDNS_BACKEND_NAME: powerdns-local
      ZONIX_POWERDNS_API_URL: http://powerdns:8081
      ZONIX_POWERDNS_API_KEY: zonix-dev-powerdns-key
      ZONIX_POWERDNS_SERVER_ID: localhost
      ZONIX_POWERDNS_TIMEOUT_SECONDS: 5
    depends_on:
      - postgres
      - powerdns
      - oidc-gateway
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
    environment:
      ZONIX_DEV_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  powerdns_db_data:
