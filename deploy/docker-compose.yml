services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: zonix
      POSTGRES_USER: zonix
      POSTGRES_PASSWORD: zonix
    ports:
      - "${ZONIX_HOST_POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zonix -d zonix"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  powerdns-db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: powerdns
      MARIADB_USER: powerdns
      MARIADB_PASSWORD: powerdns
      MARIADB_ROOT_PASSWORD: powerdns-root
    volumes:
      - ./powerdns/init/mysql:/docker-entrypoint-initdb.d:ro
      - powerdns_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -ppowerdns-root --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  powerdns:
    image: powerdns/pdns-auth-49:latest
    entrypoint:
      - /bin/sh
      - /usr/local/bin/start-powerdns.sh
    command:
      - -eu
    depends_on:
      powerdns-db:
        condition: service_healthy
    ports:
      - "${ZONIX_HOST_POWERDNS_API_PORT:-8081}:8081"
      - "${ZONIX_HOST_POWERDNS_DNS_PORT:-5300}:5300/tcp"
      - "${ZONIX_HOST_POWERDNS_DNS_PORT:-5300}:5300/udp"
    volumes:
      - ./powerdns/config:/etc/pdns-zonix:ro
      - ./powerdns/zones:/etc/pdns-zones:ro
      - ./powerdns/start-powerdns.sh:/usr/local/bin/start-powerdns.sh:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:${ZONIX_HOST_OIDC_GATEWAY_PORT:-9010}
      KC_PROXY_HEADERS: xforwarded
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/zonix-realm.json:/opt/keycloak/data/import/zonix-realm.json:ro
    ports:
      - "${ZONIX_HOST_KEYCLOAK_PORT:-9011}:8080"

  oidc-gateway:
    build:
      context: ./oidc-gateway
    environment:
      OIDC_GATEWAY_PUBLIC_BASE_URL: http://localhost:${ZONIX_HOST_OIDC_GATEWAY_PORT:-9010}
      OIDC_GATEWAY_INTERNAL_BASE_URL: http://oidc-gateway:9000
      OIDC_GATEWAY_UPSTREAM_BASE_URL: http://keycloak:8080
    depends_on:
      - keycloak
    ports:
      - "${ZONIX_HOST_OIDC_GATEWAY_PORT:-9010}:9000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:9000/realms/zonix/.well-known/openid-configuration', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ../backend
    env_file:
      - ./demo.env
    environment:
      ZONIX_ALLOWED_WEB_ORIGINS: "http://localhost:${ZONIX_HOST_FRONTEND_PORT:-5173},http://127.0.0.1:${ZONIX_HOST_FRONTEND_PORT:-5173},http://localhost:5173,http://127.0.0.1:5173"
      ZONIX_PUBLIC_BACKEND_BASE_URL: "http://127.0.0.1:${ZONIX_HOST_BACKEND_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      powerdns:
        condition: service_started
      oidc-gateway:
        condition: service_healthy
    ports:
      - "${ZONIX_HOST_BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/ready', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  frontend:
    build:
      context: ../frontend
    env_file:
      - ./demo.env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ZONIX_HOST_FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((response)=>{if(!response.ok) throw new Error(String(response.status));})",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  powerdns_db_data:
